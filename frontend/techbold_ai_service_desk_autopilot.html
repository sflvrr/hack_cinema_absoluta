<script>

const TICKETS = [

const SYSTEMS = {
  201: { ip: '10.0.1.42', port: 22, username: 'admin', os: 'Ubuntu 22.04 LTS', notes: 'Production web cluster node 1. Runs nginx + certbot. Sensitive — avoid service restarts during business hours (09:00–18:00 CET).' },
  202: { ip: '10.0.2.17', port: 2222, username: 'sysadmin', os: 'Debian 12 Bookworm', notes: 'Auth server. Hosts LDAP and fail2ban. SSH on non-standard port 2222. Root login disabled.' },
  203: { ip: '10.0.3.88', port: 22, username: 'postgres', os: 'CentOS Stream 9', notes: 'Database primary. Replicas at .89 and .90. Always check replication status before any write operations.' },
  204: { ip: '10.0.4.5', port: 22, username: 'netadmin', os: 'Ubuntu 20.04 LTS', notes: 'DNS + DHCP server. Hosts bind9 and isc-dhcp-server. Changes affect entire internal subnet.' },

const AGENT_STEPS = {
  1042: [
    { thought: 'Ticket indicates nginx is unresponsive post kernel update. I should first check the service status and review recent system logs to understand the failure mode.', command: 'systemctl status nginx && journalctl -u nginx --since "1 hour ago" --no-pager', status: 'completed', output: '● nginx.service - A high performance web server\n   Loaded: loaded (/lib/systemd/system/nginx.service)\n   Active: failed (Result: exit-code)\n   ...\nModule nf_tables version mismatch: kernel 5.15.0-91, module 5.15.0-89' },

function renderTickets() {
  const statusFilter = document.getElementById('filter-status').value;
  const sortBy = document.getElementById('filter-sort').value;
  let tickets = [...TICKETS];
  if (statusFilter) tickets = tickets.filter(t => t.status === statusFilter);
  if (sortBy === 'priority') tickets.sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
  else if (sortBy === 'id') tickets.sort((a,b) => b.id - a.id);
  else if (sortBy === 'status') tickets.sort((a,b) => a.status.localeCompare(b.status));

  const open = TICKETS.filter(t => t.status === 'OPEN').length;
  const critical = TICKETS.filter(t => t.priority === 'CRITICAL' && t.status !== 'DONE').length;
  document.getElementById('stat-open').innerHTML = `<strong>${open}</strong> open`;
  document.getElementById('stat-critical').innerHTML = `<strong>${critical}</strong> critical`;

  const el = document.getElementById('ticket-list');
  el.innerHTML = '';
  tickets.forEach(t => {
    const div = document.createElement('div');
    div.className = 'ticket-item' + (t.id === activeTicketId ? ' active' : '');
    div.onclick = () => selectTicket(t.id);
    div.innerHTML = `
      <div class="ticket-row1">
        <span class="ticket-id">#${t.id}</span>
        <span class="priority-dot ${t.priority}"></span>
        <span class="ticket-title">${t.title}</span>
      </div>
      <div class="ticket-row2">
        <span class="status-badge ${t.status}">${t.status}</span>
        <span class="priority-label">${t.priority}</span>
      </div>
    `;
    el.appendChild(div);
  });
}

function selectTicket(id) {
  activeTicketId = id;
  activeTab = 'terminal';
  editingCommand = false;
  clearInterval(countdownInterval);
  renderTickets();
  renderWorkspace();
}

function renderWorkspace() {
  const ws = document.getElementById('workspace');
  const ticket = TICKETS.find(t => t.id === activeTicketId);
  if (!ticket) {
    ws.innerHTML = '<div class="no-ticket" id="no-ticket-msg"><i class="ti ti-device-laptop" aria-hidden="true"></i><p>Select a ticket to begin</p></div>';
    return;
  }
  const sys = SYSTEMS[ticket.customer_id];
  const steps = AGENT_STEPS[activeTicketId] || [];
  const pendingStep = steps.find(s => s.status === 'pending_approval');
  const isRunning = steps.some(s => s.status === 'running');

  ws.innerHTML = `
    <div class="ticket-detail">
      <div class="detail-section">
        <div class="detail-label">Ticket ${ticket.id}</div>
        <div class="detail-title">${ticket.title}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          <span class="priority-badge-lg ${ticket.priority}">
            <span class="priority-dot ${ticket.priority}" style="width:7px;height:7px"></span>
            ${ticket.priority}
          </span>
          <span class="status-badge ${ticket.status}" style="padding:3px 8px;border-radius:6px;font-size:11px">${ticket.status}</span>
        </div>
      </div>
      ${sys ? `<div class="detail-section">
        <div class="detail-label">Target System</div>
        <div class="detail-field"><div class="detail-field-key">IP Address</div><div class="detail-field-val">${sys.ip}</div></div>
        <div class="detail-field"><div class="detail-field-key">SSH Port</div><div class="detail-field-val">${sys.port}</div></div>
        <div class="detail-field"><div class="detail-field-key">Username</div><div class="detail-field-val">${sys.username}</div></div>
        <div class="detail-field"><div class="detail-field-key">OS</div><div class="detail-field-val">${sys.os}</div></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Notes</div>
        <div class="detail-notes">${sys.notes}</div>
      </div>` : ''}
    </div>
    <div class="terminal-pane">
      <div class="terminal-header">
        <div class="terminal-header-title">${sys ? sys.username + '@' + sys.ip : 'Agent Console'}</div>
        ${isRunning ? '<div class="running-indicator"><span class="pulse-dot"></span> Executing command…</div>' : ''}
        ${pendingStep ? '<div class="running-indicator" style="color:var(--orange)"><span class="pulse-dot" style="background:var(--orange)"></span> Awaiting approval</div>' : ''}
      </div>
      <div class="view-tabs">
        <button class="view-tab ${activeTab==='terminal'?'active':''}" onclick="switchTab('terminal')">Agent Log</button>
        <button class="view-tab ${activeTab==='form'?'active':''}" onclick="switchTab('form')">Documentation</button>
      </div>
      <div id="tab-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
      ${pendingStep && activeTab==='terminal' ? renderActionPanel(pendingStep) : ''}
    </div>
  `;
  renderTabContent();
  if (pendingStep && activeTab === 'terminal') startCountdown();
}

function renderTabContent() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (activeTab === 'terminal') {
    el.innerHTML = renderTerminal();
    setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
  } else {
    el.innerHTML = renderActivityForm();
  }
}

function renderTerminal() {
  const steps = AGENT_STEPS[activeTicketId] || [];
  if (!steps.length) return '<div class="terminal-body"><span style="color:var(--text3)">Agent initializing…</span></div>';
  return `<div class="terminal-body" id="terminal-body">${steps.map((s, i) => `
    <div class="step-block">
      <div class="step-thought">
        <div class="step-thought-label">🧠 Agent Reasoning — Step ${i+1}</div>
        ${s.thought}
      </div>
      <div class="step-command">
        <span class="step-command-prompt">$</span>
        <span class="step-command-text">${s.command}</span>
      </div>
      <div class="step-status-row">
        <span class="step-status ${s.status}">${s.status.replace('_',' ')}</span>
        ${s.status === 'running' ? '<span class="spinner"></span>' : ''}
      </div>
      ${s.output ? `<div class="step-output ${s.status === 'completed' ? 'success' : s.status === 'failed' ? 'failed' : ''}">${s.output}</div>` : ''}
    </div>
  `).join('')}</div>`;
}

function renderActionPanel(step) {
  const cmd = editingCommand ? editCommandValue : step.command;
  return `<div class="action-panel" id="action-panel">
    <div class="action-panel-header">
      <i class="ti ti-alert-triangle" style="font-size:14px" aria-hidden="true"></i>
      Agent proposes command — review before execution
    </div>
    ${editingCommand
      ? `<input class="action-edit-input" id="edit-cmd-input" value="${cmd.replace(/"/g,'&quot;')}" oninput="editCommandValue=this.value" />`
      : `<div class="action-command-display">${cmd}</div>`
    }
    <div class="action-buttons">
      <button class="btn-action btn-approve" onclick="approveStep()"><i class="ti ti-player-play" aria-hidden="true"></i> Approve & Execute</button>
      <button class="btn-action btn-modify" onclick="toggleEdit()">${editingCommand ? '<i class="ti ti-check" aria-hidden="true"></i> Save Edit' : '<i class="ti ti-edit" aria-hidden="true"></i> Modify Command'}</button>
      <button class="btn-action btn-reject" onclick="rejectStep()"><i class="ti ti-x" aria-hidden="true"></i> Reject / Abort</button>
    </div>
    <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdown-bar" style="width:100%"></div></div>
    <div style="font-size:10px;color:var(--text3);margin-top:4px">Auto-timeout in <span id="countdown-num">30</span>s — no action taken</div>
  </div>`;
}

function renderActivityForm() {
  const ticket = TICKETS.find(t => t.id === activeTicketId);
  const steps = AGENT_STEPS[activeTicketId] || [];
  const cmds = steps.filter(s => s.status === 'completed').map(s => '$ ' + s.command).join('\n');
  return `<div class="activity-form-pane">
    <div class="form-section-title">Resolution Documentation</div>
    <div class="form-field">
      <label>Summary</label>
      <input type="text" value="${ticket ? ticket.title : ''}" placeholder="Brief summary of the issue and resolution" />
    </div>
    <div class="form-field">
      <label>Root Cause</label>
      <textarea placeholder="Describe the root cause identified during investigation…">Kernel module version mismatch following unattended upgrade to kernel 5.15.0-91. nginx binary was linked against 5.15.0-89 nf_tables module.</textarea>
    </div>
    <div class="form-field">
      <label>Actions Taken</label>
      <textarea placeholder="Describe remediation steps taken…">1. Identified kernel/module mismatch via journalctl\n2. Reinstalled nginx against current kernel headers\n3. Verified configuration with nginx -t\n4. Confirmed iptables rules intact</textarea>
    </div>
    <div class="form-section-title" style="margin-top:4px">Commands Executed</div>
    <div class="form-code-field">${cmds || '# No commands executed yet'}</div>
    <div class="form-section-title" style="margin-top:4px">Validation Evidence</div>
    ${['nginx service returns 200 OK on health check endpoint','journalctl shows no errors post-restart','iptables rules verified intact','Load balancer health check passing'].map(item => `
      <div class="checklist-item">
        <input type="checkbox" id="chk-${item.slice(0,10)}" checked />
        <label for="chk-${item.slice(0,10)}">${item}</label>
      </div>`).join('')}
    <div class="form-field" style="margin-top:8px">
      <label>Additional Notes</label>
      <textarea placeholder="Any additional context for the ERP record…" rows="2"></textarea>
    </div>
    <button class="btn-resolve" onclick="resolveTicket()">
      <i class="ti ti-circle-check" style="font-size:15px;vertical-align:-2px;margin-right:6px" aria-hidden="true"></i>
      Resolve & Close Ticket → POST /api/v1/activities/create
    </button>
  </div>`;
}

function switchTab(tab) {
  activeTab = tab;
  const pane = document.querySelector('.terminal-pane');
  if (!pane) return;
  const content = document.getElementById('tab-content');
  const tabs = pane.querySelectorAll('.view-tab');
  tabs.forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase().includes(tab === 'terminal' ? 'agent' : 'doc')));
  renderTabContent();
  const steps = AGENT_STEPS[activeTicketId] || [];
  const pendingStep = steps.find(s => s.status === 'pending_approval');
  let panel = document.getElementById('action-panel');
  if (pendingStep && tab === 'terminal' && !panel) {
    const html = renderActionPanel(pendingStep);
    pane.insertAdjacentHTML('beforeend', html);
    startCountdown();
  } else if (tab !== 'terminal' && panel) {
    panel.remove();
    clearInterval(countdownInterval);
  }
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdownVal = 30;
  countdownInterval = setInterval(() => {
    countdownVal--;
    const bar = document.getElementById('countdown-bar');
    const num = document.getElementById('countdown-num');
    if (bar) bar.style.width = (countdownVal / 30 * 100) + '%';
    if (num) num.textContent = countdownVal;
    if (countdownVal <= 0) {
      clearInterval(countdownInterval);
      showToast('⏱ Timeout — command was not executed', 'warning');
    }
  }, 1000);
}

function approveStep() {
  clearInterval(countdownInterval);
  const steps = AGENT_STEPS[activeTicketId];
  const idx = steps.findIndex(s => s.status === 'pending_approval');
  if (idx === -1) return;
  if (editingCommand) steps[idx].command = editCommandValue;
  steps[idx].status = 'running';
  editingCommand = false;
  renderWorkspace();
  showToast('✓ Command approved — executing via SSH runner', 'success');
  setTimeout(() => {
    steps[idx].status = 'completed';
    steps[idx].output = 'nginx.conf syntax is ok\nnginx: configuration file /etc/nginx/nginx.conf test is successful\nSynchronizing state of nginx.service...\nnginx.service started successfully';
    renderWorkspace();
    showToast('✓ Command completed successfully', 'success');
  }, 2800);
}

function toggleEdit() {
  const steps = AGENT_STEPS[activeTicketId];
  const step = steps.find(s => s.status === 'pending_approval');
  if (!step) return;
  if (!editingCommand) {
    editingCommand = true;
    editCommandValue = step.command;
  } else {
    step.command = editCommandValue;
    editingCommand = false;
  }
  renderWorkspace();
}

function rejectStep() {
  clearInterval(countdownInterval);
  const steps = AGENT_STEPS[activeTicketId];
  const idx = steps.findIndex(s => s.status === 'pending_approval');
  if (idx === -1) return;
  steps[idx].status = 'rejected';
  editingCommand = false;
  renderWorkspace();
  showToast('✗ Command rejected — agent recalculating plan', 'warning');
}

function resolveTicket() {
  const t = TICKETS.find(t => t.id === activeTicketId);
  if (t) t.status = 'DONE';
  renderTickets();
  showToast('✓ Ticket #' + activeTicketId + ' resolved — activity posted to ERP', 'success');
  setTimeout(() => { selectTicket(activeTicketId); }, 500);
}

function resetEnv() {
  const btn = document.getElementById('btn-reset');
  btn.classList.add('loading');
  btn.textContent = '⟳ Resetting…';
  showToast('🔄 POST /api/v1/me/reset — environment resetting', 'info');
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '⟳ Reset Environment';
    showToast('✓ Environment reset complete', 'success');
  }, 1800);
}

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const colors = { success: 'var(--green)', warning: 'var(--orange)', info: 'var(--accent)', error: 'var(--red)' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = colors[type] || 'var(--border2)';
  t.style.color = colors[type] || 'var(--text)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

renderTickets();
</script>
